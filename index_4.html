<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌部門 · 工作日報系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#FFF;--text:#1A1A18;--muted:#666660;--hint:#999993;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-dark:#0C447C;--blue-mid:#B5D4F4;
  --green-bg:#EAF3DE;--green:#27500A;--amber-bg:#FAEEDA;--amber:#633806;--amber-mid:#BA7517;
  --red-bg:#FCEBEB;--red:#791F1F;--red-mid:#E24B4A;
  --teal-bg:#E1F5EE;--teal:#085041;--purple-bg:#EEEDFE;--purple:#3C3489;
  --r:10px;--r-sm:7px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sb-logo{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.sb-logo h1{font-size:13px;font-weight:600;line-height:1.5}
.sb-logo p{font-size:11px;color:var(--muted);margin-top:2px}
.sb-sec{padding:12px 12px 3px;font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.08em;text-transform:uppercase}
.nav{display:flex;align-items:center;gap:8px;padding:7px 11px;margin:1px 7px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--muted);transition:all .12s;border:none;background:none;width:calc(100% - 14px);text-align:left;font-family:'Noto Sans TC',sans-serif}
.nav:hover{background:var(--bg);color:var(--text)}
.nav.active{background:var(--blue-bg);color:var(--blue-dark);font-weight:500}
.nav .badge{margin-left:auto;font-size:10px;background:var(--red-bg);color:var(--red);padding:1px 6px;border-radius:10px;font-weight:600}
.sb-footer{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--hint);line-height:1.8}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--hint);margin-right:5px;vertical-align:middle;transition:background .3s}
.sdot.ok{background:#3B6D11}.sdot.err{background:var(--red-mid)}
.toggle-wrap{display:flex;align-items:center;gap:7px;margin-top:6px}
.toggle{position:relative;width:32px;height:18px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--border2);border-radius:9px;transition:.2s}
.slider:before{content:'';position:absolute;height:12px;width:12px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.slider{background:var(--blue)}
input:checked+.slider:before{transform:translateX(14px)}
.main{padding:26px 30px;overflow-y:auto}
.panel{display:none}.panel.active{display:block}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ph h2{font-size:19px;font-weight:600}
.ph p{font-size:12px;color:var(--muted);margin-top:2px}
.ph-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{padding:7px 13px;font-size:12px;border-radius:var(--r-sm);cursor:pointer;font-family:'Noto Sans TC',sans-serif;border:1px solid var(--border2);background:var(--surface);color:var(--muted);transition:all .12s}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{opacity:.87}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.sc-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.sc-val{font-size:24px;font-weight:600;line-height:1}
.prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:20px}
.prog-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .5s}
.tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.tab{display:flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--muted);background:var(--surface);transition:all .12s;font-family:'Noto Sans TC',sans-serif}
.tab:hover{border-color:var(--blue-mid)}
.tab.active{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue-mid);font-weight:500}
.avsm{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.av-b{background:var(--blue-bg);color:var(--blue-dark)}.av-t{background:var(--teal-bg);color:var(--teal)}
.av-p{background:var(--purple-bg);color:var(--purple)}.av-a{background:var(--amber-bg);color:var(--amber)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px}
.ct{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:11px}

/* Sheet cards */
.sheet-card{background:var(--surface);border:1px solid var(--blue-mid);border-radius:var(--r);padding:14px 18px;margin-bottom:12px}
.sct{font-size:12px;font-weight:600;color:var(--blue-dark);margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sheet-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ss{background:var(--blue-bg);border-radius:var(--r-sm);padding:8px 10px;text-align:center}
.ss-val{font-size:18px;font-weight:600;color:var(--blue-dark);line-height:1}
.ss-lbl{font-size:10px;color:var(--blue-dark);opacity:.7;margin-top:2px}
.ord-row{display:grid;grid-template-columns:90px 1fr 55px 68px;gap:6px;font-size:12px;padding:5px 8px;background:var(--bg);border-radius:var(--r-sm);align-items:center;margin-bottom:4px}
.ord-row.hdr{font-weight:600;color:var(--muted);background:none;padding-bottom:2px;font-size:10px;margin-bottom:2px}
.se{font-size:12px;color:var(--hint);text-align:center;padding:10px 0}
.bsync{font-size:11px;padding:3px 10px;border:1px solid var(--blue-mid);border-radius:20px;background:var(--blue-bg);color:var(--blue-dark);cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-left:auto}
.bsync:hover{background:var(--blue-mid)}

/* Social */
.si{display:flex;gap:10px;align-items:flex-start;padding:7px 10px;background:var(--bg);border-radius:var(--r-sm);font-size:12px;margin-bottom:5px}
.si-date{font-weight:600;color:var(--blue-dark);white-space:nowrap;min-width:36px}
.si-brand{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.bt{background:var(--amber-bg);color:var(--amber)}.bs{background:var(--teal-bg);color:var(--teal)}

/* KOL progress */
.kol-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:12px}
.kol-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.kol-title{font-size:13px;font-weight:600}
.kol-sub{font-size:11px;color:var(--muted);margin-top:2px}
.kol-pills{display:flex;gap:5px;flex-wrap:wrap}
.kol-stage-hdr{display:grid;grid-template-columns:1fr repeat(5,56px);gap:4px;font-size:10px;color:var(--hint);font-weight:500;padding:0 4px;margin-bottom:4px}
.kol-stage-hdr span{text-align:center}.kol-stage-hdr span:first-child{text-align:left}
.kol-row{display:grid;grid-template-columns:1fr repeat(5,56px);gap:4px;align-items:center;padding:5px 4px;border-radius:var(--r-sm);margin-bottom:3px}
.kol-row:hover{background:var(--bg)}
.kol-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kol-fee{font-size:10px;color:var(--muted);margin-top:1px}
.sc-cell{display:flex;align-items:center;justify-content:center}
.sd{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:9px}
.sd.done{background:#3B6D11;border-color:#3B6D11;color:#fff}
.sd.cur{background:var(--blue);border-color:var(--blue);color:#fff}
.kol-foot{display:flex;align-items:center;justify-content:space-between;padding:6px 4px;border-top:1px solid var(--border);margin-top:6px;font-size:12px;color:var(--muted)}
.kol-budget{font-size:13px;font-weight:600;color:var(--blue-dark)}
.kol-loading{font-size:12px;color:var(--muted);padding:12px;text-align:center;background:var(--blue-bg);border-radius:var(--r-sm);margin-bottom:12px}

/* Task form */
.thdr{display:grid;grid-template-columns:1fr 120px 90px 28px;gap:7px;padding:0 2px;margin-bottom:4px}
.thdr span{font-size:10px;color:var(--hint);font-weight:500}
.trow{display:grid;grid-template-columns:1fr 120px 90px 28px;gap:7px;align-items:center;margin-bottom:5px}
.inp{font-size:13px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;width:100%;transition:border .12s}
.inp:focus{outline:none;border-color:var(--blue-mid);background:#fff}
select.inp{cursor:pointer}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;text-align:center;white-space:nowrap}
.sw{background:var(--amber-bg);color:var(--amber)}.sd2{background:var(--green-bg);color:var(--green)}
.sp{background:var(--blue-bg);color:var(--blue-dark)}.sb2{background:var(--red-bg);color:var(--red)}
.del{background:none;border:none;cursor:pointer;color:var(--hint);font-size:15px;line-height:1;padding:0;font-family:'Noto Sans TC',sans-serif}
.del:hover{color:var(--red-mid)}
.add-btn{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;padding:3px 0;font-family:'Noto Sans TC',sans-serif}
textarea.note{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;resize:vertical;min-height:50px;line-height:1.7}
textarea.note:focus{outline:none;border-color:var(--blue-mid);background:#fff}
.lbtn{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--blue-mid);background:var(--blue-bg);color:var(--blue-dark);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .12s}
.lbtn.linked{background:var(--blue-mid);font-weight:500}
.rtype-row{display:flex;gap:6px;margin-bottom:14px}
.rtype-btn{padding:6px 16px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;font-size:12px;font-family:'Noto Sans TC',sans-serif;background:var(--surface);color:var(--muted)}
.rtype-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}

/* Overview */
.ov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.ov-top{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.ov-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.ov-tasks{border-top:1px solid var(--border);padding-top:8px}
.ov-task{font-size:12px;color:var(--muted);margin-bottom:3px;display:flex;gap:5px;align-items:flex-start}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:6px}
.dw{background:var(--amber-mid)}.dd{background:#3B6D11}.dp{background:var(--blue)}.db{background:var(--red-mid)}
.alert-bar{border-left:3px solid var(--red-mid);background:var(--red-bg);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:8px 12px;font-size:12px;margin-bottom:7px;line-height:1.7}
.cross-bar{border-left:3px solid var(--blue);background:var(--blue-bg);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:8px 12px;font-size:12px;margin-bottom:7px;line-height:1.7}
.sec-label{font-size:11px;font-weight:600;color:var(--hint);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 7px}

/* Schedule */
.timeline{display:flex;flex-direction:column;gap:10px}
.tl-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden}
.tl-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.tl-u::before{background:var(--red-mid)}.tl-w::before{background:var(--amber-mid)}.tl-ok::before{background:#3B6D11}
.tl-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.tl-name{font-size:14px;font-weight:500}
.tl-meta{display:flex;gap:12px;font-size:12px;color:var(--muted);margin-bottom:8px;flex-wrap:wrap}
.tl-pl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.tl-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--border);margin-bottom:4px}
.tl-fill{height:100%;border-radius:3px;transition:width .4s}
.tl-tasks{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tl-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.tl-tag.done{background:var(--green-bg);color:var(--green);border-color:transparent}
.tl-acts{display:flex;gap:6px;margin-top:10px}
.tl-ebtn{font-size:11px;padding:4px 10px;border:1px solid var(--border2);border-radius:var(--r-sm);background:none;cursor:pointer;color:var(--muted);font-family:'Noto Sans TC',sans-serif}
.tl-ebtn:hover{background:var(--bg)}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-backdrop.show{display:flex}
.modal{background:var(--surface);border-radius:var(--r);padding:22px 24px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:500}
.form-inp{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif}
.form-inp:focus{outline:none;border-color:var(--blue-mid)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mcheck{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:4px 9px;border:1px solid var(--border2);border-radius:20px;background:var(--surface)}
.mcheck input{cursor:pointer}
.mcheck.checked{background:var(--blue-bg);border-color:var(--blue-mid);color:var(--blue-dark)}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* History */
.filter-row{display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap}
.fbtn{padding:4px 11px;font-size:12px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'Noto Sans TC',sans-serif}
.fbtn.active{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue-mid)}
.hcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:9px}
.hcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.htype{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--amber-bg);color:var(--amber);font-weight:600}
.htype.pm{background:var(--purple-bg);color:var(--purple)}
.empty{text-align:center;color:var(--muted);padding:3rem 0;font-size:13px;line-height:2}
.toast{position:fixed;bottom:22px;right:22px;background:#1A1A18;color:#fff;padding:10px 17px;border-radius:var(--r-sm);font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;font-family:'Noto Sans TC',sans-serif}
.toast.show{opacity:1}

@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .stats{grid-template-columns:repeat(2,1fr)}
  .ov-grid{grid-template-columns:1fr}
  .trow,.thdr{grid-template-columns:1fr 90px 80px 24px}
  .kol-stage-hdr,.kol-row{grid-template-columns:1fr repeat(5,42px)}
  .main{padding:14px}
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sb-logo"><h1>品牌部門<br>工作日報系統</h1><p id="sb-date"></p></div>
  <div class="sb-sec">填寫</div>
  <button class="nav active" onclick="goto('form',this)">📝 填寫日報</button>
  <div class="sb-sec">追蹤</div>
  <button class="nav" onclick="goto('schedule',this)">📅 檔期時程 <span class="badge" id="delay-badge" style="display:none">!</span></button>
  <button class="nav" onclick="goto('overview',this)">👁 部門全覽</button>
  <div class="sb-sec">記錄</div>
  <button class="nav" onclick="goto('hist',this)">🗂 歷史日報</button>
  <div class="sb-footer">
    <div><span class="sdot" id="sdot"></span><span id="stext">連線中…</span></div>
    <div id="scnt" style="font-size:10px;margin-top:1px;color:var(--muted)"></div>
    <div class="toggle-wrap">
      <label class="toggle"><input type="checkbox" id="ntog" onchange="toggleNotify(this.checked)"><span class="slider"></span></label>
      <span style="font-size:11px;color:var(--muted)">早晚填報提醒</span>
    </div>
    <div id="nstat" style="font-size:10px;margin-top:2px;color:var(--blue)"></div>
  </div>
</aside>

<main class="main">
  <!-- FORM -->
  <div class="panel active" id="panel-form">
    <div class="ph">
      <div><h2>填寫今日日報</h2><p id="form-date"></p></div>
      <div class="ph-right">
        <button class="btn" onclick="expTxt()">匯出文字</button>
        <button class="btn btn-p" onclick="saveAll()">儲存日報</button>
      </div>
    </div>
    <div class="stats">
      <div class="sc"><div class="sc-label">今日任務</div><div class="sc-val" id="st-t">0</div></div>
      <div class="sc"><div class="sc-label">已完成</div><div class="sc-val" id="st-d" style="color:var(--green)">0</div></div>
      <div class="sc"><div class="sc-label">進行中</div><div class="sc-val" id="st-w" style="color:var(--amber)">0</div></div>
      <div class="sc"><div class="sc-label">完成率</div><div class="sc-val" id="st-r">0%</div></div>
    </div>
    <div class="prog"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <div class="rtype-row">
      <button class="rtype-btn active" id="rt-am" onclick="setRt('am')">☀️ 早報（今日計畫）</button>
      <button class="rtype-btn" id="rt-pm" onclick="setRt('pm')">🌙 晚報（今日結果）</button>
    </div>
    <div class="tabs" id="mtabs"></div>
    <div id="farea"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="panel" id="panel-schedule">
    <div class="ph">
      <div><h2>檔期時程管理</h2><p>追蹤各大專案進度，自動偵測 delay 風險</p></div>
      <div class="ph-right"><button class="btn btn-p" onclick="openModal()">＋ 新增檔期</button></div>
    </div>
    <div class="timeline" id="tl-list"></div>
  </div>

  <!-- OVERVIEW -->
  <div class="panel" id="panel-overview">
    <div class="ph">
      <div><h2>部門全覽</h2><p id="ov-date"></p></div>
      <div class="ph-right"><button class="btn" onclick="refreshSheet()">🔄 同步 Sheet</button></div>
    </div>
    <div class="ov-grid" id="ov-grid"></div>
    <div class="sec-label">今日注意事項</div><div id="alerts-area"></div>
    <div class="sec-label">跨職位協作</div><div id="cross-area"></div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-hist">
    <div class="ph">
      <div><h2>歷史日報</h2><p>查閱所有已儲存的早報 / 晚報紀錄</p></div>
      <div class="ph-right"><button class="btn" style="color:var(--red-mid);border-color:#F7C1C1" onclick="clearHist()">清除歷史</button></div>
    </div>
    <div class="filter-row" id="hfilters"></div>
    <div id="hlist"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbyu6MiAvml1iK46puifOiclLQ4ZdLrPI-VWE8Smv-ZR0y2ju0SHqS5CQ9xjejhWPfDreA/exec';

  art:{tasks:[{detail:'TEATOP × TKB 4月檔期活動文宣',status:'進行中'},{detail:'新竹南大店第一批文宣準備',status:'進行中'},{detail:'TEATOP 兒童節著色畫輪播檔',status:'進行中'},{detail:'TOPUP 英文菜單更新、逢甲燈箱菜單',status:'進行中'},{detail:'桃園藝文店 B1 形象海報（業主確認中）',status:'待確認'}],note:'今日接單數：0　累積未發包：24',crossLinks:['pm'],crossNote:'第一批文宣印刷事宜配合健豪業務來訪'},
  design:{tasks:[{detail:'Tea 箱裝茶贈品貼紙',status:'進行中'},{detail:'Tea 紙箱修正',status:'進行中'},{detail:'Tea 店鋪積木模擬圖/燈箱模擬圖',status:'進行中'},{detail:'Tea 桶裝茶預購貼文',status:'待確認'},{detail:'Tea 桶裝茶自印海報',status:'待確認'},{detail:'Tea 紙杯紙箱 2款',status:'已完成'},{detail:'Tea 著色畫海報 logo 修正',status:'已完成'}],note:'本週完成 3 項；3月完成 13 項',crossLinks:['social'],crossNote:'桶裝茶設計稿需配合社群發布時程'},
  social:{tasks:[{detail:'TEATOP 瓶裝茶社群廣告投放（250×4）',status:'進行中'},{detail:'序序茶我的序時光廣告投放（250×4）',status:'進行中'},{detail:'21週年活動企劃統整與簡報更新',status:'進行中'},{detail:'TKB 公文補充（待回收確認）',status:'待確認'},{detail:'本週好運飲品/會員簽到社群規劃',status:'進行中'},{detail:'回覆客服訊息（社群＋官網）',status:'已完成'},{detail:'回覆粉專留言',status:'已完成'},{detail:'戀空徽章閉店改宅配資料統計',status:'已完成'}],note:'吉祥物製作費（預付打樣費）待確認；4月 KOL 合作規劃中',crossLinks:['pm','design'],crossNote:'TKB 公文回收事宜需 PM 跟進；桶裝茶需設計稿配合'}
};
const INIT_SCH=[
  {id:'s1',name:'TEATOP × TKB 聯名檔期',start:'2026-03-15',end:'2026-04-15',members:['pm','art','social'],note:'公文已簽核，待回收事宜確認',milestones:['TKB公文簽核完成','活動文宣設計','社群貼文發布','活動結束回收'],milestoneStatus:[true,false,false,false]},
  {id:'s2',name:'兒童節著色畫專案',start:'2026-03-20',end:'2026-04-04',members:['art','design'],note:'著色畫已完成重新包裝，待發布',milestones:['著色畫設計定稿','印刷發包','清點包裝','到店部署'],milestoneStatus:[true,true,true,false]},
  {id:'s3',name:'TeaTop 桶裝茶 4月上市',start:'2026-03-25',end:'2026-04-10',members:['design','social'],note:'設計稿與社群貼文時程尚未對齊',milestones:['包裝設計定稿','自印海報完成','預購貼文發布','正式上市推廣'],milestoneStatus:[false,false,false,false]},
  {id:'s4',name:'TeaTop 21週年活動企劃',start:'2026-03-10',end:'2026-04-30',members:['pm','social'],note:'簡報更新中，KOL合作規劃待啟動',milestones:['企劃書定稿','簡報完成','KOL名單確認','活動執行'],milestoneStatus:[true,false,false,false]}
];

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let state=ls(KS,JSON.parse(JSON.stringify(INIT)));
let reps=ls(KH,[]);
let schs=ls(KSC,JSON.parse(JSON.stringify(INIT_SCH)));
let shd=ls(KSD,null);
let cr='pm',rt='am',hf='all',editId=null;

function today(){const d=new Date();return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（${'日一二三四五六'[d.getDay()]}）`;}
function toISO(){return new Date().toISOString().slice(0,10);}
function dUntil(iso){return Math.ceil((new Date(iso)-new Date(toISO()))/86400000);}
function dTotal(s,e){return Math.max(1,Math.ceil((new Date(e)-new Date(s))/86400000));}
function dElapsed(s){return Math.max(0,Math.ceil((new Date(toISO())-new Date(s))/86400000));}

const TODAY=today();
document.getElementById('sb-date').textContent=TODAY;
document.getElementById('form-date').textContent=TODAY;

// Sheet
async function fetchSheet(){
  setSS('loading');
  try{
    const r=await fetch(API+'?action=getAllData');
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    shd=d; ss(KSD,shd); setSS('ok');
    if(shd.art){
      state.art.note=`今日接單數：${shd.art.todayCount}　累積未發包：${shd.art.unshippedCount}`;
      ss(KS,state);
      document.getElementById('scnt').textContent=`小芳今日接單 ${shd.art.todayCount} 筆・未發包 ${shd.art.unshippedCount} 件`;
    }
    if(cr==='art'||cr==='social') renderForm();
    return d;
  }catch(e){setSS('err');return null;}
}
function setSS(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stext');
  if(s==='ok'){dot.className='sdot ok';txt.textContent='Google Sheet 已連線';}
  else if(s==='err'){dot.className='sdot err';txt.textContent='Sheet 連線失敗';}
  else{dot.className='sdot';txt.textContent='連線中…';}
}
function refreshSheet(){toast('同步中…');fetchSheet().then(()=>toast('同步完成 ✓'));}

// Nav
function goto(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  if(id==='overview'){document.getElementById('ov-date').textContent=TODAY;renderOv();}
  if(id==='hist') renderHist();
  if(id==='schedule') renderSch();
}
function setRt(t){rt=t;document.getElementById('rt-am').classList.toggle('active',t==='am');document.getElementById('rt-pm').classList.toggle('active',t==='pm');renderForm();}
function renderTabs(){document.getElementById('mtabs').innerHTML=ROLES.map(r=>`<button class="tab ${cr===r.id?'active':''}" onclick="swMember('${r.id}')"><div class="avsm ${r.av}">${r.member[0]}</div>${r.member}・${r.name}</button>`).join('');}
function swMember(id){cr=id;renderTabs();renderForm();}

// KOL card
function kolCard(){
  const kol=shd?.kol;
  if(!kol?.brands?.length) return `<div class="kol-loading">📊 KOL 進度資料載入中… <button class="bsync" onclick="refreshSheet()">🔄 同步</button></div>`;
  const sc={'入選':'sp','到店拍攝':'sw','審稿':'sw','發布':'sd2','匯款':'sd2'};
  return kol.brands.map(b=>{
    const fmt=b.totalBudget?`NT$ ${b.totalBudget.toLocaleString()}`:'—';
    let h=`<div class="kol-card">
      <div class="kol-hdr">
        <div><div class="kol-title">${b.name}</div><div class="kol-sub">${b.brand} · ${b.totalKols} 位 KOL</div></div>
        <div class="kol-pills">${STAGES.map(s=>`<span class="pill ${sc[s]||'sp'}">${s} ${b.stageCount[s]||0}</span>`).join('')}</div>
      </div>
      <div class="kol-stage-hdr"><span>KOL 名稱</span>${STAGES.map(s=>`<span>${s}</span>`).join('')}</div>`;
    b.kols.forEach(k=>{
      const si=STAGES.indexOf(k.stage);
      h+=`<div class="kol-row">
        <div><div class="kol-name" title="${k.name}">${k.name.length>14?k.name.slice(0,14)+'…':k.name}</div>${k.fee?`<div class="kol-fee">NT$ ${k.fee.toLocaleString()}</div>`:''}</div>
        ${STAGES.map((_,i)=>`<div class="sc-cell"><div class="sd ${i<si?'done':i===si?'cur':''}">${i<si?'✓':i===si?'●':''}</div></div>`).join('')}
      </div>`;
    });

    h+=`<div class="kol-foot"><span>總預算</span><span class="kol-budget">${fmt}</span></div></div>`;
    return h;
  }).join('');
}

// Form
function renderForm(){
  const s=state[cr];
  let h='';

  if(cr==='art'){
    const art=shd?.art;
    h+=`<div class="sheet-card"><div class="sct">📋 文宣訂單即時資料 <button class="bsync" onclick="refreshSheet()">🔄 同步</button></div>
      <div class="sheet-stats">
        <div class="ss"><div class="ss-val">${art?.todayCount??'—'}</div><div class="ss-lbl">今日接單</div></div>
        <div class="ss"><div class="ss-val" style="color:var(--red)">${art?.unshippedCount??'—'}</div><div class="ss-lbl">累積未發包</div></div>
        <div class="ss"><div class="ss-val">${art?.monthTotal??'—'}</div><div class="ss-lbl">本月接單總數</div></div>
      </div>`;
    if(art?.orders?.length){
      h+=`<div class="ord-row hdr"><span>店家</span><span>品項</span><span>數量</span><span>印刷廠</span></div>`;
      art.orders.forEach(o=>h+=`<div class="ord-row"><span style="color:var(--muted)">${o.store}</span><span>${o.item}</span><span>${o.qty}</span><span style="color:var(--muted)">${o.printer||'—'}</span></div>`);
    }else h+=`<div class="se">本月目前無未發包訂單 🎉</div>`;
    h+=`</div>`;
  }

  if(cr==='social'){
    h+=kolCard();
    const up=(shd?.social?.upcoming||[]);
    if(up.length){
      h+=`<div class="sheet-card"><div class="sct">📅 近期社群排程（今日起 4 天）<button class="bsync" onclick="refreshSheet()">🔄 同步</button></div>`;
      up.forEach(i=>h+=`<div class="si"><span class="si-date">${i.date}</span><span class="si-brand ${i.brand==='TEATOP'?'bt':'bs'}">${i.brand}</span><div><div style="font-size:12px">${i.content||i.theme||'（待填）'}</div>${i.theme&&i.content?`<div style="font-size:11px;color:var(--muted)">${i.theme}</div>`:''} ${i.link?`<a href="${i.link}" target="_blank" style="font-size:11px;color:var(--blue)">🔗 企劃連結</a>`:''}</div></div>`);
      h+=`</div>`;
    }else{
      h+=`<div class="sheet-card"><div class="sct">📅 近期社群排程<button class="bsync" onclick="refreshSheet()">🔄 同步</button></div><div class="se">今日起 4 天內無排程</div></div>`;
    }
  }

  h+=`<div class="card"><div class="ct">${rt==='am'?'☀️ 今日計畫任務':'🌙 今日完成 / 進度回報'}</div>
    <div class="thdr"><span>任務說明</span><span>狀態</span><span>標示</span><span></span></div><div id="tl">`;
  s.tasks.forEach((t,i)=>{
    h+=`<div class="trow" id="tr${i}">
      <input class="inp" value="${esc(t.detail)}" onchange="ut(${i},'detail',this.value)" placeholder="輸入任務說明">
      <select class="inp" onchange="ut(${i},'status',this.value)">${SOPTS.map(o=>`<option ${t.status===o?'selected':''}>${o}</option>`).join('')}</select>
      <span class="pill ${STC[t.status]||'sp'}">${t.status}</span>
      <button class="del" onclick="rt2(${i})">×</button>
    </div>`;
  });
  h+=`</div><button class="add-btn" onclick="at()">＋ 新增任務</button></div>`;
  h+=`<div class="card"><div class="ct">${rt==='am'?'今日目標 / 備注':'今日成果 / 備注'}</div>
    <textarea class="note" onchange="state[cr].note=this.value;ss(KS,state)">${esc(s.note||'')}</textarea></div>`;
  h+=`<div class="card"><div class="ct">跨職位任務關聯</div><div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px">`;
  ROLES.filter(r=>r.id!==cr).forEach(r=>{
    const linked=(s.crossLinks||[]).includes(r.id);
    h+=`<button class="lbtn ${linked?'linked':''}" onclick="tgl('${r.id}',this)">${r.member}・${r.name}</button>`;
  });
  h+=`</div><textarea class="note" style="min-height:40px" onchange="state[cr].crossNote=this.value;ss(KS,state)" placeholder="說明協作關係…">${esc(s.crossNote||'')}</textarea></div>`;
  h+=`<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
    <button class="btn" onclick="expTxt()">匯出文字</button>
    <button class="btn btn-p" onclick="saveAll()">儲存日報</button></div>`;
  document.getElementById('farea').innerHTML=h;
  updStats();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function ut(i,f,v){state[cr].tasks[i][f]=v;if(f==='status'){const t=document.querySelector(`#tr${i} .pill`);if(t){t.className='pill '+(STC[v]||'sp');t.textContent=v;}}ss(KS,state);updStats();}
function at(){state[cr].tasks.push({detail:'',status:'進行中'});ss(KS,state);renderForm();}
function rt2(i){state[cr].tasks.splice(i,1);ss(KS,state);renderForm();}
function tgl(rid,btn){const s=state[cr];if(!s.crossLinks)s.crossLinks=[];const i=s.crossLinks.indexOf(rid);if(i>-1){s.crossLinks.splice(i,1);btn.classList.remove('linked');}else{s.crossLinks.push(rid);btn.classList.add('linked');}ss(KS,state);}

function updStats(){
  let t=0,d=0,w=0;
  ROLES.forEach(r=>{(state[r.id]?.tasks||[]).forEach(tk=>{t++;if(tk.status==='已完成')d++;if(tk.status==='進行中')w++;});});
  document.getElementById('st-t').textContent=t;
  document.getElementById('st-d').textContent=d;
  document.getElementById('st-w').textContent=w;
  const p=t?Math.round(d/t*100):0;
  document.getElementById('st-r').textContent=p+'%';
  document.getElementById('pf').style.width=p+'%';
}

function saveAll(){
  const td=toISO();
  ROLES.forEach(r=>{
    reps.unshift({date:td,display:TODAY,roleId:r.id,role:r.name,member:r.member,rt,rtl:rt==='am'?'早報':'晚報',data:JSON.parse(JSON.stringify(state[r.id]))});
  });
  ss(KH,reps);
  if(shd){
    ROLES.forEach(r=>{
      fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'saveDailyLog',report:{member:r.member,role:r.name,rtype:rt,totalTasks:state[r.id].tasks.length,doneTasks:state[r.id].tasks.filter(t=>t.status==='已完成').length,note:state[r.id].note}})}).catch(()=>{});
    });
  }
  toast('所有日報已儲存 ✓');
}

function expTxt(){
  const r=ROLES.find(x=>x.id===cr),s=state[cr];
  let txt=`【品牌部門${rt==='am'?'早報':'晚報'}】${r.member}・${r.name}\n日期：${TODAY}\n\n▌ 任務清單\n`;
  s.tasks.forEach(t=>txt+=`  ・${t.detail}（${t.status}）\n`);
  if(s.note) txt+=`\n▌ 備注\n  ${s.note}`;
  if((s.crossLinks||[]).length){txt+=`\n\n▌ 跨職位協作：${s.crossLinks.map(id=>ROLES.find(x=>x.id===id)?.member).join('、')}`;if(s.crossNote)txt+=`\n  ${s.crossNote}`;}
  navigator.clipboard.writeText(txt).then(()=>toast('已複製到剪貼簿 ✓')).catch(()=>toast('請手動複製'));
}

// Overview
function renderOv(){
  document.getElementById('ov-grid').innerHTML=ROLES.map(r=>{
    const s=state[r.id]||{tasks:[]},ts=s.tasks||[];
    const d=ts.filter(t=>t.status==='已完成').length,w=ts.filter(t=>t.status==='進行中').length,p=ts.filter(t=>t.status==='待確認').length,b=ts.filter(t=>t.status==='阻塞中').length;
    return `<div class="ov-card"><div class="ov-top"><div class="avatar ${r.av}">${r.member}</div><div><div style="font-size:14px;font-weight:500">${r.member}</div><div style="font-size:11px;color:var(--muted)">${r.name}</div></div></div>
      <div class="ov-pills">${w?`<span class="pill sw">進行中 ${w}</span>`:''} ${d?`<span class="pill sd2">完成 ${d}</span>`:''} ${p?`<span class="pill sp">待確認 ${p}</span>`:''} ${b?`<span class="pill sb2">阻塞 ${b}</span>`:''}</div>
      <div class="ov-tasks">${ts.slice(0,4).map(t=>`<div class="ov-task"><div class="dot ${t.status==='已完成'?'dd':t.status==='進行中'?'dw':t.status==='阻塞中'?'db':'dp'}"></div><span>${t.detail}</span></div>`).join('')}${ts.length>4?`<div style="font-size:11px;color:var(--hint);margin-top:2px">＋ 還有 ${ts.length-4} 項</div>`:''}</div>
    </div>`;
  }).join('');
  const al=[];
  ROLES.forEach(r=>{
    const bl=(state[r.id]?.tasks||[]).filter(t=>t.status==='阻塞中');
    const pe=(state[r.id]?.tasks||[]).filter(t=>t.status==='待確認');
    if(bl.length) al.push(`⚠️ <strong>${r.member}</strong>：${bl.map(t=>t.detail.slice(0,25)).join('、')} 目前阻塞`);
    if(pe.length) al.push(`📋 <strong>${r.member}</strong>：${pe.map(t=>t.detail.slice(0,20)).join('、')} 待確認`);
  });
  schs.forEach(s=>{const d=dUntil(s.end);if(d<=2)al.push(`⏰ 檔期「${s.name}」${d<=0?'已到期':d===1?'明日截止':`還有${d}天截止`}`);});
  document.getElementById('alerts-area').innerHTML=al.length?al.map(a=>`<div class="alert-bar">${a}</div>`).join(''):'<div style="color:var(--muted);font-size:13px">今日無特別注意事項</div>';
  const cx=[];
  ROLES.forEach(r=>{const s=state[r.id]||{};if((s.crossLinks||[]).length&&s.crossNote){const n=s.crossLinks.map(id=>ROLES.find(x=>x.id===id)?.member).join('、');cx.push(`<strong>${r.member} ↔ ${n}</strong>　${s.crossNote}`);}});
  document.getElementById('cross-area').innerHTML=cx.length?cx.map(c=>`<div class="cross-bar">${c}</div>`).join(''):'<div style="color:var(--muted);font-size:13px">目前無跨職位協作標記</div>';
}

// Schedule
function renderSch(){
  const list=document.getElementById('tl-list');
  if(!schs.length){list.innerHTML='<div class="empty">尚未新增任何檔期<br>點右上角「＋ 新增檔期」開始追蹤</div>';return;}
  let uc=0;
  list.innerHTML=schs.map(s=>{
    const d=dUntil(s.end),el=dElapsed(s.start),tot=dTotal(s.start,s.end);
    const tp=Math.min(100,Math.round(el/tot*100));
    const mp=s.milestoneStatus.length?Math.round(s.milestoneStatus.filter(Boolean).length/s.milestoneStatus.length*100):0;
    const isu=d<=3,isd=tp>mp+20;if(isu||isd)uc++;
    const cls=isu?'tl-u':isd?'tl-w':'tl-ok',bc=isu?'sb2':isd?'sw':'sd2',bl=isu?`⚠ 僅剩${d}天`:isd?'進度落後':'進度正常';
    const mn=s.members.map(id=>ROLES.find(r=>r.id===id)?.member).filter(Boolean).join('、');
    return `<div class="tl-item ${cls}" id="tl-${s.id}">
      <div class="tl-hdr"><div class="tl-name">${s.name}</div><span class="pill ${bc}">${bl}</span></div>
      <div class="tl-meta"><span>📅 ${s.start} → ${s.end}</span><span>👤 ${mn}</span>${s.note?`<span>${s.note}</span>`:''}</div>
      <div class="tl-pl"><span>時程進度 ${tp}%</span><span>任務完成 ${mp}%</span></div>
      <div class="tl-bar"><div class="tl-fill" style="width:${tp}%;background:${isu?'var(--red-mid)':isd?'var(--amber-mid)':'#3B6D11'}"></div></div>
      <div class="tl-bar"><div class="tl-fill" style="width:${mp}%;background:var(--blue)"></div></div>
      <div class="tl-tasks">${s.milestones.map((m,i)=>`<span class="tl-tag ${s.milestoneStatus[i]?'done':''}">${m}</span>`).join('')}</div>
      <div class="tl-acts">
        <button class="tl-ebtn" onclick="togMs('${s.id}')">更新里程碑</button>
        <button class="tl-ebtn" onclick="editSch('${s.id}')">編輯</button>
        <button class="tl-ebtn" style="color:var(--red-mid)" onclick="delSch('${s.id}')">刪除</button>
      </div>
    </div>`;
  }).join('');
  const b=document.getElementById('delay-badge');
  uc>0?(b.textContent=uc,b.style.display=''):b.style.display='none';
}
function togMs(id){
  const s=schs.find(x=>x.id===id);if(!s)return;
  const ex=document.getElementById('ms-'+id);if(ex){ex.remove();return;}
  const el=document.createElement('div');
  el.id='ms-'+id;el.style.cssText='margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border)';
  el.innerHTML=s.milestones.map((m,i)=>`<label style="display:flex;gap:7px;align-items:center;font-size:13px;cursor:pointer;padding:3px 0"><input type="checkbox" ${s.milestoneStatus[i]?'checked':''} onchange="setMs('${id}',${i},this.checked)"> ${m}</label>`).join('');
  document.getElementById('tl-'+id).appendChild(el);
}
function setMs(id,i,v){const s=schs.find(x=>x.id===id);if(!s)return;s.milestoneStatus[i]=v;ss(KSC,schs);renderSch();}
function editSch(id){
  editId=id;const s=schs.find(x=>x.id===id);if(!s)return;
  document.getElementById('sn').value=s.name;document.getElementById('ss').value=s.start;document.getElementById('se').value=s.end;
  document.getElementById('sms').value=s.milestones.join('\n');document.getElementById('snote').value=s.note||'';
  openModal(true);
  setTimeout(()=>{document.querySelectorAll('.mcheck').forEach(el=>{const rid=el.dataset.id;el.classList.toggle('checked',s.members.includes(rid));el.querySelector('input').checked=s.members.includes(rid);});},50);
}
function delSch(id){if(confirm('確定要刪除這個檔期嗎？')){schs=schs.filter(s=>s.id!==id);ss(KSC,schs);renderSch();toast('已刪除');}}
function openModal(isEdit=false){
  document.getElementById('modal-title').textContent=isEdit?'編輯檔期':'新增檔期 / 專案';
  if(!isEdit){editId=null;document.getElementById('sn').value='';document.getElementById('ss').value=toISO();document.getElementById('se').value='';document.getElementById('sms').value='';document.getElementById('snote').value='';}
  document.getElementById('sm').innerHTML=ROLES.map(r=>`<label class="mcheck" data-id="${r.id}" onclick="this.classList.toggle('checked');this.querySelector('input').checked=!this.querySelector('input').checked"><input type="checkbox" style="display:none"> ${r.member}</label>`).join('');
  document.getElementById('mbdrop').classList.add('show');
}
function closeModal(){document.getElementById('mbdrop').classList.remove('show');}
function saveSch(){
  const name=document.getElementById('sn').value.trim();if(!name){toast('請填寫檔期名稱');return;}
  const start=document.getElementById('ss').value,end=document.getElementById('se').value;
  if(!start||!end){toast('請填寫日期');return;}
  const members=[...document.querySelectorAll('.mcheck.checked')].map(el=>el.dataset.id);
  const milestones=document.getElementById('sms').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const note=document.getElementById('snote').value.trim();
  if(editId){
    const s=schs.find(x=>x.id===editId);
    if(s){const ol=s.milestones.length;s.name=name;s.start=start;s.end=end;s.members=members;s.note=note;s.milestones=milestones;if(milestones.length!==ol)s.milestoneStatus=milestones.map(()=>false);}
  }else schs.push({id:'s'+Date.now(),name,start,end,members,note,milestones,milestoneStatus:milestones.map(()=>false)});
  ss(KSC,schs);closeModal();renderSch();toast('已儲存 ✓');
}

// History
function renderHist(){
  document.getElementById('hfilters').innerHTML=
    `<button class="fbtn ${hf==='all'?'active':''}" onclick="setHF('all')">全部</button>
    <button class="fbtn ${hf==='am'?'active':''}" onclick="setHF('am')">早報</button>
    <button class="fbtn ${hf==='pm'?'active':''}" onclick="setHF('pm')">晚報</button>`+
    ROLES.map(r=>`<button class="fbtn ${hf===r.id?'active':''}" onclick="setHF('${r.id}')">${r.member}</button>`).join('');
  let fl=reps;
  if(hf==='am')fl=fl.filter(r=>r.rt==='am');
  else if(hf==='pm')fl=fl.filter(r=>r.rt==='pm');
  else if(hf!=='all')fl=fl.filter(r=>r.roleId===hf);
  if(!fl.length){document.getElementById('hlist').innerHTML='<div class="empty">尚未儲存任何日報<br>填寫日報後點「儲存日報」即可</div>';return;}
  document.getElementById('hlist').innerHTML=fl.map(rep=>{
    const d=(rep.data?.tasks||[]).filter(t=>t.status==='已完成').length,t=(rep.data?.tasks||[]).length;
    return `<div class="hcard">
      <div class="hcard-top"><span style="font-size:13px;font-weight:500">${rep.display||rep.date} · ${rep.member}</span>
        <div style="display:flex;gap:5px"><span class="htype ${rep.rt==='pm'?'pm':''}">${rep.rtl||'日報'}</span><span class="pill sp">${rep.role}</span></div>
      </div>
      <div style="font-size:12px;color:var(--muted)">完成 ${d}／${t} 項${rep.data?.note?' · '+String(rep.data.note).slice(0,40):''}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px">${(rep.data?.tasks||[]).slice(0,4).map(t=>`<span class="pill ${STC[t.status]||'sp'}" style="display:inline-block">${t.detail.slice(0,16)}${t.detail.length>16?'…':''}</span>`).join('')}</div>
    </div>`;
  }).join('');
}
function setHF(f){hf=f;renderHist();}
function clearHist(){if(confirm('確定清除所有歷史日報嗎？')){reps=[];ss(KH,reps);renderHist();toast('歷史已清除');}}

// Notify
function toggleNotify(en){
  if(en){
    if(!('Notification' in window)){toast('此瀏覽器不支援通知');document.getElementById('ntog').checked=false;return;}
    Notification.requestPermission().then(p=>{
      if(p==='granted'){localStorage.setItem('bd_notify','1');schedNoti();document.getElementById('nstat').textContent='已開啟：09:00 早報・18:00 晚報';toast('填報提醒已開啟 ✓');}
      else{document.getElementById('ntog').checked=false;toast('請先允許瀏覽器通知');}
    });
  }else{localStorage.removeItem('bd_notify');document.getElementById('nstat').textContent='';toast('填報提醒已關閉');}
}
function schedNoti(){
  const now=new Date(),am=new Date(now),pm=new Date(now);
  am.setHours(9,0,0,0);pm.setHours(18,0,0,0);
  setTimeout(()=>{if(Notification.permission==='granted'&&localStorage.getItem('bd_notify')){new Notification('品牌部門 · 早報提醒 ☀️',{body:'早安！請填寫今日工作計畫'});schedNoti();}},am>now?am-now:86400000-(now-am));
  setTimeout(()=>{if(Notification.permission==='granted'&&localStorage.getItem('bd_notify'))new Notification('品牌部門 · 晚報提醒 🌙',{body:'下班前，請填寫今日工作結果！'});},pm>now?pm-now:86400000-(now-pm));
}
if(localStorage.getItem('bd_notify')){document.getElementById('ntog').checked=true;document.getElementById('nstat').textContent='已開啟：09:00 早報・18:00 晚報';if(Notification.permission==='granted')schedNoti();}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// Init
renderTabs();renderForm();fetchSheet();
</script>
